<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFusion — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f1117;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: #1a1d21;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 40px 36px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .login-logo i {
            font-size: 2rem;
            color: #0d6efd;
        }

        .login-logo span {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .login-logo small {
            display: block;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: -4px;
        }

        .form-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.65);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control {
            background: #0f1117;
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        .form-control:focus {
            background: #0f1117;
            border-color: #0d6efd;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background: #0d6efd;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #0b5ed7;
        }

        .error-alert {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ea868f;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        [data-bs-theme="light"] body { background-color: #f0f2f5; }
        [data-bs-theme="light"] .login-card { background: #fff; border-color: rgba(0,0,0,0.1); }
        [data-bs-theme="light"] .login-logo span { color: #212529; }
        [data-bs-theme="light"] .form-control { background: #f8f9fa; border-color: rgba(0,0,0,0.15); color: #212529; }
        [data-bs-theme="light"] .form-control:focus { background: #fff; color: #212529; }
        [data-bs-theme="light"] .form-label { color: rgba(0,0,0,0.6); }
        [data-bs-theme="light"] .theme-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<button class="theme-btn" id="themeToggle">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
    <span id="themeLabel">Sombre</span>
</button>

<div class="login-card">
    <div class="login-logo">
        <i class="bi bi-lightning-fill"></i>
        <div>
            <span>StreamFusion</span>
            <small>Administration</small>
        </div>
    </div>

    {% if error %}
    <div class="error-alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        {{ error }}
    </div>
    {% endif %}

    <form action="{{ url_for('login')(request) }}" method="post">
        <div class="mb-4">
            <label for="secret_key" class="form-label">Clé secrète</label>
            <input type="password" class="form-control" id="secret_key" name="secret_key"
                   placeholder="••••••••••••••••" required autofocus>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-1"></i> Connexion
        </button>
    </form>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const html = document.documentElement;

    function applyTheme(theme) {
        html.setAttribute('data-bs-theme', theme);
        localStorage.setItem('sf-theme', theme);
        themeIcon.className = theme === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
        themeLabel.textContent = theme === 'dark' ? 'Sombre' : 'Clair';
    }

    applyTheme(localStorage.getItem('sf-theme') || 'dark');
    themeToggle.addEventListener('click', () => {
        applyTheme(html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
    });
</script>
</body>
</html>
